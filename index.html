<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>lexis-editor</title>
    </head>
    <body>
        <main class="container centered">
            <h1>Welcome to Lexis Editor</h1>

            <form method="get">
                <div style="display: grid; gap: 1em">
                    <lexis-toolbar id="edx-toolbar">
                        <button
                            type="button"
                            data-command="bold"
                            class="lexis-button"
                        >
                            Bold
                        </button>
                        <button
                            type="button"
                            data-command="italic"
                            class="lexis-button"
                        >
                            Italic
                        </button>
                        <button
                            type="button"
                            data-command="underline"
                            class="lexis-button"
                        >
                            Underline
                        </button>
                        <button
                            type="button"
                            data-command="paragraph"
                            class="lexis-button"
                        >
                            Normal
                        </button>
                        <button
                            type="button"
                            data-command="bullet-list"
                            class="lexis-button"
                        >
                            Bullet List
                        </button>
                        <button
                            type="button"
                            data-command="number-list"
                            class="lexis-button"
                        >
                            Number List
                        </button>
                        <button
                            type="button"
                            data-command="heading-2"
                            class="lexis-button"
                        >
                            Heading
                        </button>
                        <button
                            type="button"
                            data-command="heading-3"
                            class="lexis-button"
                        >
                            Sub Heading
                        </button>
                        <button
                            type="button"
                            data-command="quote"
                            class="lexis-button"
                        >
                            Quote
                        </button>
                        <button
                            type="button"
                            data-command="undo"
                            class="lexis-button"
                        >
                            Undo
                        </button>
                        <button
                            type="button"
                            data-command="redo"
                            class="lexis-button"
                        >
                            Redo
                        </button>
                    </lexis-toolbar>

                    <lexis-editor
                        name="content"
                        toolbar="edx-toolbar"
                        required
                    ></lexis-editor>

                    <button type="submit">Submit</button>
                </div>
            </form>
        </main>
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
